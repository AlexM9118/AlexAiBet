<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1600" viewBox="0 0 900 1600" fill="none">
  <rect width="900" height="1600" fill="#070A10"/>
  <rect x="30" y="40" width="840" height="180" rx="34" fill="#0E131C" stroke="#202A36"/>
  <text x="60" y="95" fill="#D8A8AC" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">FOCUSUL ZILEI</text>
  <text x="60" y="150" fill="#F4F8FB" font-family="Arial, sans-serif" font-size="42" font-weight="700">Top selectii + combinatii gata grupate</text>
  <text x="60" y="190" fill="#95A2B4" font-family="Arial, sans-serif" font-size="24">Varianta editoriala, cu accent pe cele mai bune pick-uri ale zilei.</text>

  <rect x="30" y="260" width="840" height="260" rx="28" fill="#101720" stroke="#1D2733"/>
  <text x="60" y="320" fill="#FFF7F7" font-family="Arial, sans-serif" font-size="34" font-weight="700">Top 3 azi</text>
  <text x="60" y="360" fill="#95A2B4" font-family="Arial, sans-serif" font-size="22">Cele mai bune trei selectii individuale, indiferent de profil.</text>
  <rect x="60" y="392" width="780" height="50" rx="16" fill="#151D27"/>
  <text x="82" y="425" fill="#F5F7FA" font-family="Arial, sans-serif" font-size="21" font-weight="700">PSV vs AZ</text>
  <text x="555" y="425" fill="#8ED8AE" font-family="Arial, sans-serif" font-size="21">Peste 2.5 goluri</text>
  <text x="772" y="425" fill="#F5F7FA" font-family="Arial, sans-serif" font-size="21" font-weight="700">1.66</text>
  <rect x="60" y="450" width="780" height="50" rx="16" fill="#151D27"/>
  <text x="82" y="483" fill="#F5F7FA" font-family="Arial, sans-serif" font-size="21" font-weight="700">Braga vs Boavista</text>
  <text x="560" y="483" fill="#8ED8AE" font-family="Arial, sans-serif" font-size="21">Ambele marcheaza</text>
  <text x="772" y="483" fill="#F5F7FA" font-family="Arial, sans-serif" font-size="21" font-weight="700">1.48</text>

  <rect x="30" y="560" width="840" height="420" rx="28" fill="#101720" stroke="#1D2733"/>
  <text x="60" y="620" fill="#FFF7F7" font-family="Arial, sans-serif" font-size="34" font-weight="700">Strategia zilei</text>
  <text x="60" y="660" fill="#95A2B4" font-family="Arial, sans-serif" font-size="22">3 versiuni ale aceleiasi zile, in functie de apetit.</text>
  <rect x="60" y="700" width="240" height="220" rx="22" fill="#18232D"/>
  <text x="86" y="748" fill="#A4E4BE" font-family="Arial, sans-serif" font-size="24" font-weight="700">Conservator</text>
  <text x="86" y="792" fill="#F4F8FB" font-family="Arial, sans-serif" font-size="20">2-3 leg-uri curate</text>
  <text x="86" y="824" fill="#98A4B4" font-family="Arial, sans-serif" font-size="18">Cota mai mica, stabilitate mai buna</text>
  <text x="86" y="876" fill="#F4F8FB" font-family="Arial, sans-serif" font-size="42" font-weight="700">2.48</text>
  <rect x="328" y="700" width="240" height="220" rx="22" fill="#1A2430"/>
  <text x="354" y="748" fill="#98C6FF" font-family="Arial, sans-serif" font-size="24" font-weight="700">Echilibrat</text>
  <text x="354" y="792" fill="#F4F8FB" font-family="Arial, sans-serif" font-size="20">Valoare + probabilitate</text>
  <text x="354" y="824" fill="#98A4B4" font-family="Arial, sans-serif" font-size="18">Cea mai buna alegere implicita</text>
  <text x="354" y="876" fill="#F4F8FB" font-family="Arial, sans-serif" font-size="42" font-weight="700">4.91</text>
  <rect x="596" y="700" width="244" height="220" rx="22" fill="#1D2332"/>
  <text x="622" y="748" fill="#DABAF8" font-family="Arial, sans-serif" font-size="24" font-weight="700">Curajos</text>
  <text x="622" y="792" fill="#F4F8FB" font-family="Arial, sans-serif" font-size="20">Mai agresiv, dar controlat</text>
  <text x="622" y="824" fill="#98A4B4" font-family="Arial, sans-serif" font-size="18">Cand vrei upside mai mare</text>
  <text x="622" y="876" fill="#F4F8FB" font-family="Arial, sans-serif" font-size="42" font-weight="700">9.84</text>

  <rect x="30" y="1020" width="840" height="260" rx="28" fill="#101720" stroke="#1D2733"/>
  <text x="60" y="1080" fill="#FFF7F7" font-family="Arial, sans-serif" font-size="34" font-weight="700">De ce merita azi</text>
  <text x="60" y="1120" fill="#95A2B4" font-family="Arial, sans-serif" font-size="22">Varietate buna intre goluri, BTTS si 1X2. Fara suprapuneri inutile.</text>
  <rect x="60" y="1150" width="780" height="80" rx="18" fill="#151D27"/>
  <text x="84" y="1196" fill="#F5F7FA" font-family="Arial, sans-serif" font-size="21">Astazi, varianta recomandata implicit este</text>
  <text x="508" y="1196" fill="#98C6FF" font-family="Arial, sans-serif" font-size="21" font-weight="700">Echilibrat</text>
</svg>
